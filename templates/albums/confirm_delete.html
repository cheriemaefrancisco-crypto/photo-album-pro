{% extends "base.html" %}
{% block content %}
<section class="form-shell">
  <h1>Confirm Delete</h1>
  <p>Are you sure you want to delete this item?</p>
  <form method="post" target="_self">
    {% csrf_token %}
    <button class="cta" type="submit">Yes, delete</button>
  </form>
</section>
{% endblock %}
